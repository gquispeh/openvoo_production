# ============================================
# Traefik - Configuracion Estatica
# ============================================

api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic/
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@openvoo.com
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web
