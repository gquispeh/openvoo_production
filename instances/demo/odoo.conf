[options]
; Las credenciales de BD y master password se inyectan
; automaticamente desde .env via docker-compose.
; NO las pongas aqui.

; --- Seguridad ---
; Si cambias esta password, cambiala tambien en openvoo/odoo.conf y en .env
admin_passwd = 0p3nVO0

; --- Base de datos ---
db_name = demo
list_db = False

; --- Rutas de addons ---
addons_path = /mnt/enterprise,/mnt/custom-addons

; --- Rendimiento (demo usa menos recursos) ---
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Proxy ---
proxy_mode = True
