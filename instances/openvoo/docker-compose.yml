# ============================================
# Instancia: OpenVoo (produccion)
# Dominio: openvoo.com
# ============================================

networks:
  openvoo_network:
    external: true

volumes:
  openvoo_data:
  openvoo_web:

services:
  openvoo:
    image: odoo:19.0
    container_name: openvoo
    restart: unless-stopped
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ../../enterprise:/mnt/enterprise:ro
      - ./addons:/mnt/custom-addons
      - openvoo_data:/var/lib/odoo
      - openvoo_web:/var/lib/odoo/filestore
    networks:
      - openvoo_network
