[options]
; --- Base de datos ---
db_host = postgres
db_port = 5432
db_user = odoo
db_password = CAMBIAR_ESTA_PASSWORD_SEGURA
db_name = openvoo

; --- Rutas de addons ---
addons_path = /mnt/enterprise,/mnt/custom-addons

; --- Seguridad ---
admin_passwd = CAMBIAR_MASTER_PASSWORD
list_db = False

; --- Rendimiento ---
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Proxy ---
proxy_mode = True
