# ============================================
# Core: Traefik (reverse proxy) + PostgreSQL
# ============================================
# Este compose levanta la infraestructura base.
# Todos los Odoo se conectan a estos servicios.

networks:
  openvoo_network:
    name: openvoo_network
    driver: bridge

volumes:
  postgres_data:
  traefik_acme:

services:
  # ----- Reverse Proxy -----
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_acme:/acme
    networks:
      - openvoo_network

  # ----- Base de Datos Compartida -----
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openvoo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
